# AmneziaWG server config. Strict `awg setconf`-compatible format —
# carries only the fields the loader accepts (PrivateKey, ListenPort,
# AWG params, Peer keys/AllowedIPs). Address / MTU / PostUp / PostDown
# are wg-quick concepts that `awg setconf` rejects with "Line
# unrecognized"; whatever entrypoint loads this file is responsible for
# `ip addr add <subnet>.1/<prefix> dev <iface>`, MTU, and iptables
# MASQUERADE / FORWARD setup. See docs/architecture.md.
#
# Jc/Jmin/Jmax/S1/S2/H1-H4 must match every client EXACTLY — one
# mismatched param silently times out the handshake (by AWG design,
# resists active probing). Rotate via awg-server/rotate-awg-params.sh
# which updates this server config and every per-device awg-<dev>.conf
# atomically; clients then re-import (Amnezia VPN doesn't auto-refresh).
[Interface]
ListenPort = 51820
PrivateKey = AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=
Jc = 8
Jmin = 40
Jmax = 80
S1 = 75
S2 = 110
H1 = 1234567890
H2 = 2345678901
H3 = 3456789012
H4 = 987654321

[Peer]
# test_dave/pc
PublicKey = zo060cy2M+x7cMF4FKXHbs0CloUFDTRHRboFhw5YfVk=
AllowedIPs = 10.66.66.17/32
PersistentKeepalive = 0

