# Fixed secrets for golden tests. All values are obviously-fake and
# deterministic — the goldens embed them verbatim, so changes here break
# tests deliberately (e.g. if someone rotates the reality keypair in the
# fixture, the signature of every rendered config changes and goldens
# need regeneration). None of these are live credentials; safe to commit.
shared:
  reality_public_key: TEST_REALITY_PUBLIC_KEY_______________________
  reality_private_key: TEST_REALITY_PRIVATE_KEY______________________
  hy2_obfs_salamander_password: TEST_SALAMANDER_16B=
  shadowsocks_password: TEST_SS_PSK_32B_BASE64_PADDING_TO_44_CHARS=
  server_clash_secret: testclashsecret000000000000000000000000000000

