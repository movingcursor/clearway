# Iran. National firewall is more aggressive on QUIC and on
# TLS-with-uncommon-SNIs than CN/RU. ShadowTLS+SS-2022 is the most
# consistently reliable sing-box-native path post-2025-shutdown;
# AWG (separate Amnezia VPN app) is the recommended parallel tunnel.
flag: 🇮🇷
label: IR

doh_tag: shecan_doh
doh_server: free.shecan.ir

# Bootstrap DNS for users physically in IR. 1.1.1.1 is ISP-filtered
# under the national firewall; Shecan Public DNS is reachable inside IR
# and resolves CF hostnames truthfully for the pre-tunnel WS-CDN host
# lookup. Shecan is also a common Iranian unblocker so its use doesn't
# stand out on the wire.
bootstrap_dns: 178.22.122.100

tld_suffixes: [ir]

geosite: geosite-ir
geoip: geoip-ir

# No IR-specific blocked-list in the current config (the country is so
# broadly filtered that "blocked sites with .ir TLDs" isn't a meaningful
# subset).
blocked_ruleset: null

rulesets:
  - { tag: geosite-ir, url: https://cdn.jsdelivr.net/gh/chocolate4u/Iran-sing-box-rules@rule-set/geosite-ir.srs, update_interval: 1d }
  - { tag: geoip-ir,   url: https://cdn.jsdelivr.net/gh/chocolate4u/Iran-sing-box-rules@rule-set/geoip-ir.srs,   update_interval: 1d }

# Chocolate4u maintains country-specific threat/ad lists for IR that
# catch Iranian phishing/malware domains not covered by the global
# hagezi lists. Emitted into the DNS reject rule alongside hagezi.
dns_reject_rulesets:
  - { tag: iran-malware,  url: https://cdn.jsdelivr.net/gh/chocolate4u/Iran-sing-box-rules@rule-set/geosite-malware.srs,          update_interval: 1d }
  - { tag: iran-phishing, url: https://cdn.jsdelivr.net/gh/chocolate4u/Iran-sing-box-rules@rule-set/geosite-phishing.srs,         update_interval: 1d }
  - { tag: iran-ads,      url: https://cdn.jsdelivr.net/gh/chocolate4u/Iran-sing-box-rules@rule-set/geosite-category-ads-all.srs, update_interval: 1d }

protocols:
  recommended: [shadowtls, ws-cf, awg]
  # Country default for the 🔀 Proxy selector. shadowtls — the most
  # consistent surviving sing-box-native path in IR (per Jigsaw +
  # net4people summaries, blocking it would break government TLS
  # dependencies). Reality is not viable as a default since MCI/TCI
  # block Reality server IPs within hours; ws-cf survives on some ISPs
  # but is unreliable. AWG runs as a parallel Amnezia VPN tunnel.
  default: shadowtls
  notes: |
    Reality dropped: MCI/TCI block Reality server IPs within hours of
    detection (Xray-core #2451, #3269); the 2025 "stealth blackout"
    tightened the protocol whitelist further. Reality is not a viable
    primary in IR.

    hy2 dropped: QUIC is disabled on all Iranian ISPs as of the June
    2025 shutdown — unidentified UDP is dropped on most networks,
    MCI/TCI tear down QUIC after 2-3 packets (net4people/bbs #489).

    ShadowTLS+SS2022 is the most consistent surviving path: per Jigsaw
    and net4people summaries, blocking it would break government TLS
    dependencies. ws-cf is unreliable post-blackout but kept as a
    secondary because state varies by ISP.
