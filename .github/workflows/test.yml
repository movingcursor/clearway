name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # manual retry from `gh workflow run tests` or the Actions UI — useful when GitHub Actions has degraded runner allocation

permissions:
  contents: read

jobs:
  golden-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # render.py's runtime deps. `cryptography` is needed for X25519 public-
      # key derivation on the AWG path (per-user awg_private_key → public key
      # in the awg-server [Peer] block). Test fixtures + harness otherwise
      # use stdlib only.
      - name: Install dependencies
        run: pip install jsonschema pyyaml cryptography

      - name: Render syntax check
        run: python3 -c "import ast; ast.parse(open('singbox-profiles/render.py').read())"

      - name: Golden-file tests
        working-directory: singbox-profiles
        run: python3 tests/test_render.py
